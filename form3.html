<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>乗船中（アルバイト記入）｜船日報</title>
<link rel="stylesheet" href="common.css">
</head>
<body>
<div class="mock-badge">MOCK</div>
<div class="app">
  <header>
    <h1>乗船中（アルバイト記入）</h1>
    <div class="sub">第十八あみ達丸</div>
  </header>

  <div class="content">

    <div class="section-title">基本情報（自動引き継ぎ）</div>

    <div class="field">
      <label>🚢 船名<span class="prefilled-tag">自動</span></label>
      <input type="text" value="第十八あみ達丸" readonly class="prefilled">
    </div>

    <div class="field">
      <label>日付・昼夜<span class="prefilled-tag">自動</span></label>
      <input type="text" value="2026-05-16（夜）" readonly class="prefilled">
    </div>

    <div class="field">
      <label>乗船区分<span class="prefilled-tag">①から引き継ぎ</span></label>
      <input id="boardingDisplay" type="text" value="🎌 貸切" readonly class="prefilled">
    </div>

    <div class="field" id="groupNameRow">
      <label>団体名<span class="prefilled-tag">①から引き継ぎ</span></label>
      <input id="groupNameDisplay" type="text" value="○○商事 様" readonly class="prefilled">
      <div class="hint">貸切時のみ表示</div>
    </div>

    <div class="section-title">記入者</div>

    <div class="field">
      <label>区分<span class="required">必須</span></label>
      <div class="option-grid">
        <label class="option"><input type="radio" name="kw">社員</label>
        <label class="option"><input type="radio" name="kw">アルバイト</label>
      </div>
    </div>

    <div class="field">
      <label>名前（アルバイト）<span class="required">必須</span></label>
      <input type="text" placeholder="例：田中 花子">
      <div class="hint">区分が「社員」の場合はプルダウンに切り替わる</div>
    </div>

    <div class="section-title">お客様の様子</div>

    <div class="field">
      <label>反応<span class="required">必須</span></label>
      <select>
        <option value="">選択してください</option>
        <option>とても喜んでいた</option>
        <option>まあまあ喜んでいた</option>
        <option>あまり喜んでなかった</option>
      </select>
    </div>

    <div class="field">
      <label>理由<span class="required">必須</span></label>
      <textarea placeholder="何を特に喜んでいたか、もしくは喜んでいなかったか"></textarea>
    </div>

    <div class="section-title">食事</div>

    <div class="field">
      <label>食べた量<span class="required">必須</span></label>
      <select>
        <option value="">選択してください</option>
        <option>よく食べた</option>
        <option>ふつう</option>
        <option>あまり食べなかった</option>
      </select>
    </div>

    <div class="field">
      <label>食べた種類（複数選択・任意）</label>
      <div class="multiselect" data-name="食べた種類">
        <button type="button" class="multiselect-button" onclick="toggleMultiselect(this)">
          <span class="multiselect-label">選択してください</span>
          <span class="multiselect-arrow">▼</span>
        </button>
        <div class="multiselect-options" style="display:none;">
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">刺身盛り合わせ</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">天ぷら</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">唐揚げ</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">茶碗蒸し</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">焼き魚</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">特になし</label>
        </div>
      </div>
      <div class="hint">タップして選択肢を開く・複数選択可</div>
    </div>

    <div class="field">
      <label>残った種類（複数選択・任意）</label>
      <div class="multiselect" data-name="残った種類">
        <button type="button" class="multiselect-button" onclick="toggleMultiselect(this)">
          <span class="multiselect-label">選択してください</span>
          <span class="multiselect-arrow">▼</span>
        </button>
        <div class="multiselect-options" style="display:none;">
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">刺身盛り合わせ</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">天ぷら</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">唐揚げ</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">茶碗蒸し</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">焼き魚</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">特になし</label>
        </div>
      </div>
    </div>

    <div class="section-title">ドリンク</div>

    <div class="field">
      <label>飲んだ量<span class="required">必須</span></label>
      <select>
        <option value="">選択してください</option>
        <option>よく飲んだ</option>
        <option>普通</option>
        <option>あまり飲まなかった</option>
      </select>
    </div>

    <div class="field">
      <label>飲んだ種類(複数選択・任意)</label>
      <div class="multiselect" data-name="飲んだ種類">
        <button type="button" class="multiselect-button" onclick="toggleMultiselect(this)">
          <span class="multiselect-label">選択してください</span>
          <span class="multiselect-arrow">▼</span>
        </button>
        <div class="multiselect-options" style="display:none;">
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">ビール（生）</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">日本酒</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">焼酎</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">ハイボール</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">ソフトドリンク</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">特になし</label>
        </div>
      </div>
    </div>

    <div class="field">
      <label>飲まなかった種類（複数選択・任意）</label>
      <div class="multiselect" data-name="飲まなかった種類">
        <button type="button" class="multiselect-button" onclick="toggleMultiselect(this)">
          <span class="multiselect-label">選択してください</span>
          <span class="multiselect-arrow">▼</span>
        </button>
        <div class="multiselect-options" style="display:none;">
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">ビール（生）</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">日本酒</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">焼酎</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">ハイボール</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">ソフトドリンク</label>
          <label class="option"><input type="checkbox" onchange="updateMultiselectLabel(this)">特になし</label>
        </div>
      </div>
    </div>

    <div class="section-title">備考</div>

    <div class="field">
      <label>備考（任意）</label>
      <textarea placeholder="自由記入"></textarea>
    </div>

    <div class="toggle-mock">
      <strong>モック表示切替：</strong>
      <a href="?type=norai">乗合</a> ／
      <a href="?type=kashikiri">貸切</a>
    </div>

  </div>

  <div class="fixed-bottom">
    <a href="confirm.html?from=3" class="btn-primary">送信する</a>
  </div>
</div>
<script>
  // 乗合/貸切 引き継ぎ
  (function(){
    var params = new URLSearchParams(location.search);
    var type = params.get('type') || 'kashikiri';
    var boardingEl = document.getElementById('boardingDisplay');
    var groupRow = document.getElementById('groupNameRow');
    if (type === 'norai') {
      boardingEl.value = '👥 乗合';
      groupRow.style.display = 'none';
    } else {
      boardingEl.value = '🎌 貸切';
      groupRow.style.display = '';
    }
  })();

  // マルチセレクト：開閉
  function toggleMultiselect(btn) {
    var wrap = btn.closest('.multiselect');
    var opts = wrap.querySelector('.multiselect-options');
    var isOpen = opts.style.display !== 'none';
    opts.style.display = isOpen ? 'none' : 'flex';
    wrap.classList.toggle('open', !isOpen);
  }

  // マルチセレクト：チェックでラベル更新
  function updateMultiselectLabel(cb) {
    var wrap = cb.closest('.multiselect');
    var labelEl = wrap.querySelector('.multiselect-label');
    var checked = wrap.querySelectorAll('input[type="checkbox"]:checked');
    if (checked.length === 0) {
      labelEl.innerHTML = '選択してください';
      labelEl.classList.remove('has-value');
    } else {
      var names = Array.from(checked).map(function(c) {
        return c.parentElement.textContent.trim();
      });
      labelEl.innerHTML = '<span class="multiselect-count">' + checked.length + '</span>' + names.join('、');
      labelEl.classList.add('has-value');
    }
  }

  // 外側クリックで閉じる
  document.addEventListener('click', function(e) {
    document.querySelectorAll('.multiselect.open').forEach(function(ms) {
      if (!ms.contains(e.target)) {
        ms.querySelector('.multiselect-options').style.display = 'none';
        ms.classList.remove('open');
      }
    });
  });
</script>
</body>
</html>
