<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>乗船前（アルバイト記入）｜船日報</title>
<link rel="stylesheet" href="common.css">
</head>
<body>
<div class="mock-badge">MOCK</div>
<div class="app">
  <header>
    <h1>乗船前（アルバイト記入）</h1>
    <div class="sub">第十八あみ達丸</div>
  </header>

  <div class="content">

    <div class="section-title">基本情報（自動引き継ぎ）</div>

    <div class="field">
      <label>🚢 船名<span class="prefilled-tag">自動</span></label>
      <input type="text" value="第十八あみ達丸" readonly class="prefilled">
    </div>

    <div class="field">
      <label>日付・昼夜<span class="prefilled-tag">①から引き継ぎ</span></label>
      <input type="text" value="2026-05-16（夜）" readonly class="prefilled">
    </div>

    <div class="field">
      <label>乗船区分<span class="required">必須</span><span class="prefilled-tag" id="inheritedTag" style="display:none;">船長記入から自動入力</span></label>
      <div class="option-grid">
        <label class="option"><input type="radio" name="boarding" value="norai">👥 乗合</label>
        <label class="option"><input type="radio" name="boarding" value="kashikiri">🎌 貸切</label>
      </div>
      <div class="hint" id="inheritedHint" style="display:none;">船長が先に送信していたため、その値が表示されています（変更可）</div>
    </div>

    <div class="field" id="groupNameField" style="display: none;">
      <label>団体名<span class="required">必須</span></label>
      <input id="groupNameInput" type="text" placeholder="例：○○商事 様">
      <div class="hint">貸切時のみ記入</div>
    </div>

    <div class="section-title">当日のメンバー</div>

    <div class="field">
      <label>社員（チェック）<span class="required">必須</span></label>
      <div class="option-list">
        <label class="option"><input type="checkbox">山田 太郎</label>
        <label class="option"><input type="checkbox">鈴木 一郎</label>
        <label class="option"><input type="checkbox">佐藤 健</label>
        <label class="option"><input type="checkbox">田中 信</label>
      </div>
      <div class="hint">マスタから自動表示・複数選択可</div>
    </div>

    <div class="field">
      <label>アルバイト（自由記入）</label>
      <textarea placeholder="例：&#10;田中 花子&#10;伊藤 美咲"></textarea>
      <div class="hint">アルバイトがいない日は空欄でOK</div>
    </div>

    <div class="section-title">体調確認</div>

    <div class="field">
      <label>体調<span class="required">必須</span></label>
      <div class="option-grid">
        <label class="option"><input type="radio" name="cond" value="ok">全員 良好</label>
        <label class="option"><input type="radio" name="cond" value="ng">不調者あり</label>
      </div>
    </div>

    <div class="field" id="symptomField" style="display: none;">
      <label>不調者の名前と症状<span class="required">必須</span></label>
      <textarea placeholder="例：&#10;山田 太郎：軽い頭痛&#10;鈴木 一郎：咳・鼻水"></textarea>
      <div class="hint">1行に1名・名前と症状を記入</div>
    </div>

    <div class="toggle-mock">
      <strong>モック表示切替：</strong>
      <a href="?inherited=none">アルバイトが先（空欄）</a> ／
      <a href="?inherited=norai">船長が先・乗合</a> ／
      <a href="?inherited=kashikiri">船長が先・貸切</a>
    </div>

  </div>

  <div class="fixed-bottom">
    <a href="confirm.html?from=2" class="btn-primary">送信する</a>
  </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var params = new URLSearchParams(location.search);
    var inherited = params.get('inherited') || 'none'; // none / norai / kashikiri

    var boardingRadios = document.querySelectorAll('input[name="boarding"]');
    var groupField = document.getElementById('groupNameField');
    var groupInput = document.getElementById('groupNameInput');
    var inheritedTag = document.getElementById('inheritedTag');
    var inheritedHint = document.getElementById('inheritedHint');

    // 引き継ぎがあれば初期値を入れる
    if (inherited === 'norai' || inherited === 'kashikiri') {
      var preselect = document.querySelector('input[name="boarding"][value="' + inherited + '"]');
      if (preselect) preselect.checked = true;
      if (inherited === 'kashikiri') {
        groupInput.value = '○○商事 様';
      }
      inheritedTag.style.display = '';
      inheritedHint.style.display = '';
    }

    function updateBoarding() {
      var c = document.querySelector('input[name="boarding"]:checked');
      groupField.style.display = (c && c.value === 'kashikiri') ? 'block' : 'none';
    }
    boardingRadios.forEach(function(r) {
      r.addEventListener('change', updateBoarding);
      r.addEventListener('click', updateBoarding);
    });
    updateBoarding();

    // 体調 → 症状欄
    var condRadios = document.querySelectorAll('input[name="cond"]');
    var symptomField = document.getElementById('symptomField');
    function updateCond() {
      var c = document.querySelector('input[name="cond"]:checked');
      symptomField.style.display = (c && c.value === 'ng') ? 'block' : 'none';
    }
    condRadios.forEach(function(r) {
      r.addEventListener('change', updateCond);
      r.addEventListener('click', updateCond);
    });
    updateCond();
  });
</script>
</body>
</html>
